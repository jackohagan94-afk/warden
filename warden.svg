<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9"/>
      <stop offset="100%" style="stop-color:#2c5f8a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#0077b6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>

  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#2c5f8a" stroke-width="2" opacity="0.5"/>

  <!-- Shield body -->
  <path d="M256 80 L120 150 L120 260 C120 350 180 420 256 440 C332 420 392 350 392 260 L392 150 Z"
        fill="url(#shield)" stroke="#00d4ff" stroke-width="1.5" opacity="0.9"/>

  <!-- Shield inner highlight -->
  <path d="M256 100 L140 162 L140 258 C140 338 192 400 256 418 C320 400 372 338 372 258 L372 162 Z"
        fill="none" stroke="#ffffff" stroke-width="1" opacity="0.15"/>

  <!-- Crosshair / eye center -->
  <circle cx="256" cy="256" r="48" fill="none" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="url(#accent)" opacity="0.8"/>
  <circle cx="256" cy="256" r="8" fill="#ffffff"/>

  <!-- Crosshair lines -->
  <line x1="256" y1="190" x2="256" y2="218" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
  <line x1="256" y1="294" x2="256" y2="322" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
  <line x1="190" y1="256" x2="218" y2="256" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>
  <line x1="294" y1="256" x2="322" y2="256" stroke="url(#accent)" stroke-width="3" filter="url(#glow)"/>

  <!-- Corner accents -->
  <path d="M256 120 L256 140" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M256 372 L256 392" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M120 256 L140 256" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
  <path d="M372 256 L392 256" stroke="#00d4ff" stroke-width="2" opacity="0.6"/>
</svg>
