services:
  warden:
    image: ghcr.io/jackohagan94-afk/warden:latest
    container_name: warden
    hostname: warden
    restart: unless-stopped
    environment:
      TZ: Australia/Brisbane
      LOG_LEVEL: INFO
      WARDEN_MODE: warden
    volumes:
      - /mnt/user/appdata/warden:/config:ro
    networks:
      - homelab

networks:
  homelab:
    external: true
